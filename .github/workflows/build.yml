name: build-check
# Runs the exact same install + build steps Vercel uses, so we can see the
# actual error text (Vercel doesn't expose build logs via the GitHub API,
# only a generic "Deployment has failed" string).
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install --legacy-peer-deps
      - run: npm run build
